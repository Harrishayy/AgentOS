name: llm-agent
command: ["/usr/bin/python3", "/opt/agents/demo.py"]
allowed_hosts:
  - api.anthropic.com:443
  - api.openai.com:443
  - 10.0.0.0/8
allowed_paths:
  - /opt/agents/
  - /tmp/llm-agent.log
working_dir: /opt/agents
env:
  ANTHROPIC_API_KEY: "${TEST_API_KEY}"
  PYTHONUNBUFFERED: "1"
user: "65534"
timeout: "5m"
description: "Demo LLM agent with two-LLM-provider egress allowlist; runs as nobody."
